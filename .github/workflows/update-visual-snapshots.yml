name: Update Visual Snapshots

# Regenerates the visual-regression baselines on Linux (matching the CI runner)
# and publishes them as a downloadable artifact. Run this when a visual change
# is intentional, or to bootstrap baselines on a new branch.
#
# Maintainer-triggered only (workflow_dispatch). In the "Run workflow" dropdown,
# pick the branch to regenerate baselines for. Then download the
# "visual-baselines" artifact, replace e2e/__screenshots__ in your branch with
# its contents, and commit. See docs/guides/TESTING.md.
#
# Read-only by design: it does not push. Committing the baselines yourself keeps
# this workflow free of write credentials and means the commit triggers the
# usual PR checks (a bot push with GITHUB_TOKEN would not).
on:
  workflow_dispatch:

concurrency:
  group: update-visual-snapshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-chromium-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Regenerate visual baselines
        run: npm run test:e2e:visual:update

      - name: Upload generated baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: visual-baselines
          path: e2e/__screenshots__/
          retention-days: 7
