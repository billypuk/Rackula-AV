name: Import NetBox Devices

on:
  workflow_dispatch:
    inputs:
      vendor:
        description: "Vendor name (case-sensitive, e.g., Ubiquiti, Dell, Synology)"
        required: true
        type: string
      slug:
        description: "Device slug to import (leave empty for all)"
        required: false
        type: string
      dry_run:
        description: "Dry run only (no changes)"
        required: false
        type: boolean
        default: true

jobs:
  import:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Validate inputs
        env:
          VENDOR: ${{ inputs.vendor }}
          SLUG: ${{ inputs.slug }}
        run: |
          # Reject newline/CR so inputs cannot inject extra lines/commands, and enforce a
          # charset allowlist so shell metacharacters never reach the run: steps below,
          # mirroring build-lxc-dev.yml's "Validate label" step.
          case "$VENDOR" in
            *$'\n'*|*$'\r'*)
              echo "ERROR: vendor must not contain newline or CR characters"
              exit 1
              ;;
          esac
          if ! echo "$VENDOR" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "ERROR: vendor may only contain A-Z a-z 0-9 . _ -"
            exit 1
          fi

          case "$SLUG" in
            *$'\n'*|*$'\r'*)
              echo "ERROR: slug must not contain newline or CR characters"
              exit 1
              ;;
          esac
          if [ -n "$SLUG" ] && ! echo "$SLUG" | grep -qE '^[A-Za-z0-9._-]+$'; then
            echo "ERROR: slug may only contain A-Z a-z 0-9 . _ -"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run import script
        id: import
        env:
          VENDOR: ${{ inputs.vendor }}
          SLUG: ${{ inputs.slug }}
        run: |
          FLAGS="--vendor $VENDOR"

          if [ -n "$SLUG" ]; then
            FLAGS="$FLAGS --slug $SLUG"
          else
            FLAGS="$FLAGS --all"
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi

          echo "Running: npx tsx scripts/import-netbox-devices.ts $FLAGS"
          npx tsx scripts/import-netbox-devices.ts $FLAGS

      - name: Process images
        if: inputs.dry_run == false
        run: npm run process-images

      - name: Check for changes
        if: inputs.dry_run == false
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: inputs.dry_run == false && steps.changes.outputs.has_changes == 'true'
        env:
          VENDOR: ${{ inputs.vendor }}
          SLUG: ${{ inputs.slug }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(devices): import ${{ env.VENDOR }} devices from NetBox"
          title: "feat(devices): Import ${{ env.VENDOR }} devices from NetBox"
          body: |
            ## Summary
            Automated import of ${{ env.VENDOR }} devices from the NetBox devicetype-library.

            **Vendor:** ${{ env.VENDOR }}
            **Device:** ${{ env.SLUG || 'All available' }}

            ## Checklist
            - [ ] Review imported device definitions
            - [ ] Verify images render correctly
            - [ ] Update `bundledImages.ts` if needed
            - [ ] Run tests locally

            ---
            🤖 Generated by NetBox Import Action
          branch: import/${{ env.VENDOR }}-devices
          labels: feature,area:devices
