# Dependabot configuration for Rackula
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily" # Daily catches updates sooner, prevents batch accumulation
    open-pull-requests-limit: 15
    groups:
      # Related packages that MUST update together
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
      eslint:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "globals"
      svelte:
        patterns:
          - "svelte"
          - "@sveltejs/*"
          - "svelte-*"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      # Catch-all groups for remaining deps
      production-dependencies:
        dependency-type: "production"
        exclude-patterns:
          - "svelte"
          - "@sveltejs/*"
          - "svelte-*"
      development-dependencies:
        dependency-type: "development"
        exclude-patterns:
          - "vitest"
          - "@vitest/*"
          - "eslint"
          - "@eslint/*"
          - "eslint-*"
          - "globals"
          - "typescript"
          - "@types/*"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "js-yaml"
        update-types: ["version-update:semver-major"]
      # @testing-library/svelte 5.4.0+ pulls @testing-library/svelte-core 1.1.x,
      # whose wrapper-scaffold.svelte uses `export let` and is rejected by Svelte
      # runes mode (breaks the whole component-test suite). Hold at 5.3.x until
      # upstream ships a runes-compatible svelte-core. See issue #2587.
      - dependency-name: "@testing-library/svelte"
        versions: [">=5.4.0"]
      # typescript-eslint peer range caps at <6.1.0; remove when typescript-eslint supports TS 7
      - dependency-name: "typescript"
        versions: [">=7.0.0"]

  # api workspace runs on Bun (api/bun.lock is the source of truth).
  # Dependabot supports bun for version updates (not security updates);
  # CVE detection is covered by Trivy image scans + dependency-graph alerts.
  - package-ecosystem: "bun"
    directory: "/api"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "js-yaml"
        update-types: ["version-update:semver-major"]

  # GitHub Actions - group all together
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
