# Shared security headers for LXC native deployment
# Included by nginx.conf in both the server block and any location block
# that defines its own add_header (nginx drops server-level add_header
# when a location has its own).
#
# CROSS-REF: deploy/security-headers.conf is the Docker variant of this file.
# When updating one, check if the other needs the same change.
#
# SINGLE SOURCE OF TRUTH for LXC deployments. Edit headers here, not in nginx.conf.
#
# HSTS note: Strict-Transport-Security is intentionally omitted from this
# default config because the LXC container serves HTTP on port 80. Browsers
# ignore HSTS over plain HTTP per RFC 6797 S7.2. To enable HSTS, add it
# in your reverse proxy config (Caddy, Traefik, etc.) where TLS terminates.

add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;

# Privacy controls — limit information leakage and browser feature access
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

# Content Security Policy — defense-in-depth against XSS
# No external script-src or connect-src origins
# script-src 'self': No inline scripts. The build emits none (verified in #2028:
# the GH-Pages redirect shim was the only inline script and was removed), so no
# hashes are needed. If a build-emitted inline script ever returns, pin its hash
# here and in the Docker variant together.
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self';" always;