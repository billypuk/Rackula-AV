<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Fallback CSP for hosting paths that bypass the nginx headers (see
         deploy/security-headers.conf, the single source of truth for the
         server-sent policy). Meta CSP cannot carry frame-ancestors (browsers
         ignore it on a <meta> element), so clickjacking protection there is
         server-only; a bare static serve loses that layer but keeps the rest. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self'; base-uri 'self'; form-action 'self';"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      type="image/png"
      href="/favicon-light.png"
      media="(prefers-color-scheme: light)"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- Color scheme hints for iOS Safari -->
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#21222c" />
    <title>Rackula - Rack Layout Designer</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- Runtime deployment config (window.__RACKULA_CONFIG__). static/config.js
         ships a browser-mode default in every build; container deployments
         (Docker entrypoint, LXC install/update scripts) overwrite it at runtime.
         CROSS-REF: static/config.js, deploy/docker-entrypoint-wrapper.sh,
         deploy/lxc/community-scripts/{install/rackula-install.sh,ct/rackula.sh} -->
    <script src="/config.js" vite-ignore></script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
